line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "A", "C4", "PT", "SIM"]
ignore = [
    "E501",  # Line too long (handled by black)
    "B008",  # Do not perform function calls in argument defaults (common in Typer CLI)
    "A003",  # Class attribute shadowing builtin (acceptable for config classes)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # Unused imports in __init__.py
"tests/*.py" = ["F401"]   # Unused imports in tests
