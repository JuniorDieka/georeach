# GeoReach Configuration
# Study area: Fizi Territory, South Kivu Province, DRC

study_area:
  name: "Fizi Territory"
  admin_level: 3
  country_code: "COD"
  bbox:
    west: 27.3
    south: -4.5
    east: 29.1
    north: -3.5

crs:
  analysis: "EPSG:32735"
  storage: "EPSG:4326"

h3:
  resolution: 6  # Reduced for demo mode to avoid resource constraints

database:
  host: "${DB_HOST:localhost}"
  port: 5432
  name: "georeach"
  user: "${DB_USER:georeach}"
  password: "${DB_PASSWORD:georeach}"

data_sources:
  admin_boundaries:
    source: "HDX"
    url: "https://data.humdata.org/dataset/cod-ab-cod"
  population:
    source: "WorldPop"
    url: "https://hub.worldpop.org/geodata/listing?id=75"
    year: 2020
  overture:
    source: "Overture Maps"
    release: "2024-01-17-alpha.0"
    theme: ["buildings", "places", "transportation"]
  health_facilities:
    source: "healthsites.io"
    url: "https://healthsites.io/api/v2/facilities/"
  flood_hazard:
    source: "synthetic"
    note: "Demo synthetic flood layer for portfolio purposes"

analysis:
  accessibility:
    threshold_km: 5.0
    moderate_km: 10.0
    method: "network"
  priority:
    exposure_weight: 0.6
    accessibility_weight: 0.4
    top_percentile: 10

outputs:
  formats: ["geoparquet", "cog", "pmtiles", "stac"]
  compression: "zstd"

logging:
  level: "INFO"
  format: "json"
